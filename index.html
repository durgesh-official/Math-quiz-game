<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Math Quiz Game</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.game-box{
    width:100%;
    max-width:400px;
    background:white;
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
}

h1{
    margin-bottom:20px;
    color:#333;
}

.score-box{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
    font-size:18px;
    font-weight:bold;
}

.question{
    font-size:40px;
    margin:25px 0;
    color:#222;
    font-weight:bold;
}

input{
    width:100%;
    padding:15px;
    font-size:20px;
    border:2px solid #ccc;
    border-radius:10px;
    outline:none;
    text-align:center;
}

input:focus{
    border-color:#4facfe;
}

button{
    margin-top:15px;
    width:100%;
    padding:15px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#4facfe;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#008cff;
}

.result{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
    min-height:30px;
}

.correct{
    color:green;
}

.wrong{
    color:red;
}

.timer{
    margin-top:15px;
    font-size:18px;
    font-weight:bold;
    color:#ff5722;
}

.game-over{
    margin-top:20px;
    font-size:25px;
    color:#e91e63;
    font-weight:bold;
}

.restart-btn{
    background:#28a745;
}

.restart-btn:hover{
    background:#1f8a37;
}
</style>
</head>

<body>

<div class="game-box">

    <h1>Math Quiz Game</h1>

    <div class="score-box">
        <div>Score: <span id="score">0</span></div>
        <div>Lives: <span id="lives">3</span></div>
    </div>

    <div class="question" id="question">
        5 + 3
    </div>

    <input type="number" id="answer" placeholder="Enter Answer">

    <button onclick="checkAnswer()">Submit Answer</button>

    <div class="timer">
        Time Left: <span id="time">10</span>s
    </div>

    <div class="result" id="result"></div>

    <div class="game-over" id="gameOver"></div>

    <button class="restart-btn" id="restartBtn" onclick="restartGame()" style="display:none;">
        Restart Game
    </button>

</div>

<script>
let num1, num2;
let operator;
let correctAnswer;

let score = 0;
let lives = 3;

let timeLeft = 10;
let timer;

function generateQuestion(){

    clearInterval(timer);

    timeLeft = 10;
    document.getElementById("time").innerText = timeLeft;

    num1 = Math.floor(Math.random() * 50) + 1;
    num2 = Math.floor(Math.random() * 50) + 1;

    operator = Math.random() > 0.5 ? "+" : "-";

    if(operator === "+"){
        correctAnswer = num1 + num2;
    }else{
        if(num2 > num1){
            [num1, num2] = [num2, num1];
        }
        correctAnswer = num1 - num2;
    }

    document.getElementById("question").innerText =
        `${num1} ${operator} ${num2}`;

    document.getElementById("answer").value = "";
    document.getElementById("result").innerText = "";

    startTimer();
}

function startTimer(){

    timer = setInterval(() => {

        timeLeft--;

        document.getElementById("time").innerText = timeLeft;

        if(timeLeft <= 0){

            clearInterval(timer);

            lives--;

            document.getElementById("lives").innerText = lives;

            document.getElementById("result").innerHTML =
                "⏰ Time Up!";

            document.getElementById("result").className =
                "result wrong";

            checkGameOver();

            if(lives > 0){
                setTimeout(generateQuestion, 1000);
            }
        }

    },1000);
}

function checkAnswer(){

    let userAnswer =
        Number(document.getElementById("answer").value);

    if(userAnswer === correctAnswer){

        score++;

        document.getElementById("score").innerText = score;

        document.getElementById("result").innerHTML =
            "✅ Correct!";

        document.getElementById("result").className =
            "result correct";

    }else{

        lives--;

        document.getElementById("lives").innerText = lives;

        document.getElementById("result").innerHTML =
            `❌ Wrong! Answer: ${correctAnswer}`;

        document.getElementById("result").className =
            "result wrong";
    }

    clearInterval(timer);

    checkGameOver();

    if(lives > 0){
        setTimeout(generateQuestion, 1000);
    }
}

function checkGameOver(){

    if(lives <= 0){

        clearInterval(timer);

        document.getElementById("gameOver").innerHTML =
            `Game Over! Final Score: ${score}`;

        document.getElementById("restartBtn").style.display =
            "block";

        document.querySelector("button").disabled = true;

        document.getElementById("answer").disabled = true;
    }
}

function restartGame(){

    score = 0;
    lives = 3;

    document.getElementById("score").innerText = score;
    document.getElementById("lives").innerText = lives;

    document.getElementById("gameOver").innerHTML = "";

    document.getElementById("restartBtn").style.display =
        "none";

    document.querySelector("button").disabled = false;

    document.getElementById("answer").disabled = false;

    generateQuestion();
}

generateQuestion();
</script>

</body>
</html>
